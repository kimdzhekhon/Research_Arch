name: researcharch
description: "ResearchArch - 자율적 AI 연구 에이전트"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # LangChain Dart
  langchain: ^0.7.6
  langchain_openai: ^0.7.2
  langchain_community: ^0.3.2

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Vector DB
  qdrant: ^1.0.1+1

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  intl: ^0.20.1
  json_annotation: ^4.9.0
  path: ^1.9.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  flutter_markdown: ^0.7.4+3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  fl_chart: ^0.70.2
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/
